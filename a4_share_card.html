<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #dde4f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .card {
    background: #fff;
    width: 320px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,51,153,0.15);
  }

  .top-badge {
    background: #1433a0;
    color: #fff;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 9px 0;
    text-transform: uppercase;
  }

  .image-wrap {
    position: relative;
    background: #f0f3fa;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
  }

  .image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }

  .image-wrap:hover img {
    transform: scale(1.04);
  }

  .image-wrap:hover .overlay {
    opacity: 1;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(20, 51, 160, 0.5);
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .deal-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #1433a0;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 4px;
    letter-spacing: 0.08em;
    z-index: 2;
  }

  .content {
    padding: 18px 20px 20px;
  }

  .brand {
    font-size: 10px;
    font-weight: 700;
    color: #1433a0;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .product-name {
    font-size: 16px;
    font-weight: 900;
    color: #1a1a1a;
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .copy {
    font-size: 12px;
    color: #444;
    line-height: 1.7;
    margin-bottom: 18px;
    padding: 10px 12px;
    background: #f0f3fa;
    border-left: 3px solid #1433a0;
    border-radius: 0 6px 6px 0;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px 0;
    background: #1433a0;
    color: #fff;
    text-align: center;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:hover {
    background: #0f278a;
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn-arrow {
    margin-left: 6px;
    opacity: 0.8;
  }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: #bbb;
    padding: 10px 0 4px;
    letter-spacing: 0.03em;
  }
</style>
