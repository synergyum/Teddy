<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국가대표 A4용지 - 카카오톡 공유</title>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      max-width: 420px;
      margin: 0 auto;
      padding: 24px;
      background: #f5f5f5;
    }
    h2 {
      font-size: 18px;
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .kakao-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .kakao-card img {
      width: 100%;
      display: block;
    }
    .kakao-card .info {
      padding: 16px;
    }
    .kakao-card .info h3 {
      font-size: 15px;
      color: #111;
      margin-bottom: 6px;
      font-weight: 800;
    }
    .kakao-card .info p {
      font-size: 13px;
      color: #888;
    }
    .kakao-card .btn-area {
      border-top: 1px solid #eee;
      text-align: center;
      padding: 14px;
      font-size: 14px;
      color: #555;
      font-weight: 600;
    }
    .share-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #FEE500;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .share-btn:hover {
      background: #FADA0A;
    }
    .note {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 16px;
      line-height: 1.6;
    }
    .error-msg {
      display: none;
      background: #FFEBEE;
      color: #C62828;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>국가대표 A4용지 80g 2,500매</h2>

  <a class="kakao-card" href="https://www.coupang.com/vp/products/9454794426?itemId=28130205100&vendorItemId=95085857447" target="_blank">
    <img src="https://gi.esmplus.com/synergyum0/synergyum/260311_A4_%EC%8D%B8%EB%84%A4%EC%9D%BC_4.png" alt="국가대표 A4용지">
    <div class="info">
      <h3>국가대표 A4용지 80g 2,500매</h3>
      <p>Made in Korea, 최저가 구매</p>
    </div>
    <div class="btn-area">쿠팡에서 구매하기 →</div>
  </a>

  <button class="share-btn" onclick="shareToKakao()">
    카카오톡으로 공유하기 💬
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <p class="note">
    카드 클릭 → 쿠팡 제품 페이지로 이동<br>
    노란 버튼 → 카카오톡으로 지인에게 공유
  </p>

  <script>
    try {
      Kakao.init('2b8b454766036d77d0e85f95b4121e5f');
    } catch(e) {
      showError('SDK 초기화 실패: ' + e.message);
    }

    // 쿠팡으로 자동 이동하는 중간 페이지 (등록된 도메인)
    var BUY_URL = 'https://synergyum.github.io/Teddy/buy.html';

    function shareToKakao() {
      if (!Kakao.isInitialized()) {
        showError('SDK 초기화 실패. 페이지를 새로고침 해주세요.');
        return;
      }

      try {
        Kakao.Share.sendDefault({
          objectType: 'feed',
          content: {
            title: '■ 국가대표 A4용지 80g 2,500매',
            description: 'Made in Korea, 최저가 구매',
            imageUrl: 'https://gi.esmplus.com/synergyum0/synergyum/260311_A4_%EC%8D%B8%EB%84%A4%EC%9D%BC_4.png',
            link: {
              mobileWebUrl: BUY_URL,
              webUrl: BUY_URL,
            },
          },
          buttons: [{
            title: '구매하기',
            link: {
              mobileWebUrl: BUY_URL,
              webUrl: BUY_URL,
            },
          }],
        });
      } catch(e) {
        showError('공유 실패: ' + e.message);
      }
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>

</body>
</html>
